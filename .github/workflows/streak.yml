name: GitHub Readme Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  streak-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Generate streak stats image
        uses: DenverCoder1/github-readme-streak-stats@master
        with:
          user_id: 202379826
          token: ${{ secrets.STREAK_TOKEN }}
